<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pippa Paper Dolls</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="app">

    <div id="leftPanel">

        <h2>Collections</h2>

        <ul id="collections"></ul>

    </div>

    <div id="stageContainer">

        <div id="mobileToolbar">

            <button id="showCollections">
                ☰ Collections
            </button>

            <button id="showOutfits">
                👗 Outfits
            </button>

        </div>

        <div id="stage">

            <img id="backgroundLayer">
            <img id="dollLayer">
            <img id="dressLayer">
            <img id="topInLayer">
            <img id="skirtLayer">
            <img id="trousersInLayer">
            <img id="shoesLayer">
            <img id="trousersLayer">
            <img id="topLayer">
            <img id="jacketLayer">
            <img id="hatLayer">
            <img id="bagLayer">
            <img id="frameLayer">
            <img id="handLayer">

        </div>

    </div>

    <div id="rightPanel">

        <h2 id="collectionTitle">Outfits</h2>

        <p id="collectionInfo"></p>

        <div id="outfits"></div>

    </div>

</div>

<div id="overlay"></div>

<script src="js/scene.js"></script>
<script src="js/renderer.js"></script>
<script src="js/wardrobe.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script src="js/mobile.js"></script>

</body>

</html>
