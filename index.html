<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pippa Paper Dolls</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>

<div id="app">


<div id="leftPanel">

    <div id="boutiqueLogo">
        <img src="assets/boutique.png"
             alt="Pippa's Boutique">
    </div>


    <div id="wardrobeMenu"></div>

</div>



    <div id="stageContainer">


        <div id="mobileToolbar">

            <button id="showCollections">
                🧳 Wardrobe
            </button>

        </div>



        <div id="stage">

            <img id="backgroundLayer">
            <img id="dollLayer">
            <img id="topInLayer">
            <img id="trousersInLayer">
            <img id="shoesLayer">
            <img id="dressLayer">
            <img id="skirtLayer">
            <img id="trousersLayer">
            <img id="topLayer">
            <img id="jacketLayer">
            <img id="hatLayer">
            <img id="bagLayer">
            <img id="frameLayer">
            <img id="handLayer">

        </div>


    </div>


</div>


<div id="overlay"></div>



<script src="js/scene.js"></script>
<script src="js/renderer.js"></script>
<script src="js/wardrobe.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script src="js/mobile.js"></script>


</body>

</html>
